name: Daily AI Research

on:
  schedule:
    - cron: '0 13 * * 1-5'   # UTC 13:00 = 美东 09:00，开盘前30分钟
  workflow_dispatch:

jobs:
  daily-research:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install requests yfinance schedule python-dotenv openai feedparser numpy pandas scipy

    - name: Run price monitor
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        timeout 55 python monitor.py || true

    - name: Run news sentiment
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        timeout 55 python news_sentiment.py || true

    - name: Run signal system
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        timeout 55 python signal_system.py || true